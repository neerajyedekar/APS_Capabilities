<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS Automation API · Capability Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0D0F14;
  --bg1:      #13161D;
  --bg2:      #1A1E28;
  --bg3:      #222738;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #E8EAF0;
  --text2:    #9499A8;
  --text3:    #5C6070;
  --accent:   #4F8EF7;
  --accent2:  #6AABFF;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --display:  'Syne', sans-serif;

  /* Engine accent colours */
  --revit:    #34C78A;
  --autocad:  #4F8EF7;
  --inventor: #F5A623;
  --dsmax:    #E05B5B;
  --fusion:   #A78BFA;

  /* Weight colours */
  --light-bg:  rgba(52,199,138,0.12);
  --light-fg:  #34C78A;
  --medium-bg: rgba(245,166,35,0.12);
  --medium-fg: #F5A623;
  --heavy-bg:  rgba(224,91,91,0.12);
  --heavy-fg:  #E05B5B;
  --varies-bg: rgba(167,139,250,0.12);
  --varies-fg: #A78BFA;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Layout ──────────────────────────────────────────────────────── */
.shell{display:flex;flex-direction:column;min-height:100vh}

/* ── Header ──────────────────────────────────────────────────────── */
.header{
  padding:20px 28px 0;
  border-bottom:1px solid var(--border);
}
.header-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:16px;
  padding-bottom:18px;
}
.brand{display:flex;flex-direction:column;gap:4px}
.brand-eyebrow{
  font-family:var(--mono);font-size:10px;letter-spacing:0.12em;
  color:var(--accent);text-transform:uppercase;
}
.brand-title{
  font-family:var(--display);font-size:22px;font-weight:700;
  color:#fff;letter-spacing:-0.02em;line-height:1.2;
}
.brand-sub{
  font-size:12px;color:var(--text3);margin-top:2px;
}
.stats-row{
  display:flex;gap:20px;align-items:center;flex-shrink:0;
}
.stat{text-align:right}
.stat-n{
  font-family:var(--display);font-size:20px;font-weight:700;color:#fff;
  line-height:1;
}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:0.06em;text-transform:uppercase}
.stat-div{width:1px;height:32px;background:var(--border2)}

/* Engine tabs */
.engine-tabs{
  display:flex;gap:2px;padding-bottom:0;
  overflow-x:auto;scrollbar-width:none;
}
.engine-tabs::-webkit-scrollbar{display:none}
.etab{
  display:flex;align-items:center;gap:7px;
  padding:10px 16px 11px;
  border:none;background:none;cursor:pointer;
  font-family:var(--sans);font-size:13px;font-weight:500;
  color:var(--text3);white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  position:relative;top:1px;
}
.etab:hover{color:var(--text)}
.etab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.5;transition:opacity .15s}
.etab.active{color:#fff}
.etab.active .dot{opacity:1}
.etab[data-e="Revit"].active{border-color:var(--revit);color:var(--revit)}
.etab[data-e="Revit"] .dot{background:var(--revit)}
.etab[data-e="AutoCAD"].active{border-color:var(--autocad);color:var(--autocad)}
.etab[data-e="AutoCAD"] .dot{background:var(--autocad)}
.etab[data-e="Inventor"].active{border-color:var(--inventor);color:var(--inventor)}
.etab[data-e="Inventor"] .dot{background:var(--inventor)}
.etab[data-e="3ds Max"].active{border-color:var(--dsmax);color:var(--dsmax)}
.etab[data-e="3ds Max"] .dot{background:var(--dsmax)}
.etab[data-e="Fusion"].active{border-color:var(--fusion);color:var(--fusion)}
.etab[data-e="Fusion"] .dot{background:var(--fusion)}

/* ── Toolbar ─────────────────────────────────────────────────────── */
.toolbar{
  display:flex;align-items:center;gap:10px;
  padding:14px 28px;border-bottom:1px solid var(--border);
  background:var(--bg1);flex-wrap:wrap;
}
.search-wrap{
  position:relative;flex:1;min-width:200px;max-width:360px;
}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
  display:flex;align-items:center;
}
.search-input{
  width:100%;padding:8px 12px 8px 34px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;
  outline:none;transition:border-color .15s;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent)}

.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{
  padding:6px 12px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active-light{background:var(--light-bg);border-color:var(--light-fg);color:var(--light-fg)}
.filter-btn.active-medium{background:var(--medium-bg);border-color:var(--medium-fg);color:var(--medium-fg)}
.filter-btn.active-heavy{background:var(--heavy-bg);border-color:var(--heavy-fg);color:var(--heavy-fg)}
.filter-btn.active-varies{background:var(--varies-bg);border-color:var(--varies-fg);color:var(--varies-fg)}

.view-toggle{display:flex;gap:2px;margin-left:auto}
.vtbtn{
  padding:6px 10px;border:1px solid var(--border);background:var(--bg2);
  color:var(--text3);cursor:pointer;font-size:14px;transition:all .15s;
}
.vtbtn:first-child{border-radius:6px 0 0 6px}
.vtbtn:last-child{border-radius:0 6px 6px 0}
.vtbtn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

.result-count{font-size:12px;color:var(--text3);margin-left:auto;white-space:nowrap}

/* ── Main content ────────────────────────────────────────────────── */
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 140px)}

/* Sidebar */
.sidebar{
  width:200px;flex-shrink:0;
  border-right:1px solid var(--border);
  overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--bg3) transparent;
  padding:12px 0;
}
.sidebar-label{
  padding:6px 16px;font-size:10px;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text3);font-family:var(--mono);
}
.cat-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:7px 16px;border:none;background:none;
  cursor:pointer;font-family:var(--sans);font-size:12px;color:var(--text2);
  text-align:left;transition:all .12s;gap:8px;
}
.cat-btn:hover{background:var(--bg2);color:var(--text)}
.cat-btn.active{background:var(--bg2);color:#fff;font-weight:600}
.cat-btn.active .cat-dot{opacity:1}
.cat-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:0;transition:opacity .12s}
.cat-count{
  font-size:10px;color:var(--text3);background:var(--bg3);
  padding:1px 6px;border-radius:10px;flex-shrink:0;
  font-family:var(--mono);
}
.cat-btn.active .cat-count{background:rgba(79,142,247,0.15);color:var(--accent)}

/* Content area */
.content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent;padding:20px 24px}

/* ── Grid view ───────────────────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}

.cap-card{
  background:var(--bg1);border:1px solid var(--border);
  border-radius:10px;padding:16px;cursor:pointer;
  transition:border-color .15s,transform .15s,background .15s;
  display:flex;flex-direction:column;gap:8px;
}
.cap-card:hover{
  border-color:var(--border2);background:var(--bg2);
  transform:translateY(-1px);
}
.cap-card.selected{border-color:var(--accent);background:var(--bg2)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:13px;font-weight:600;color:#fff;line-height:1.3;flex:1}
.weight-pill{
  flex-shrink:0;font-size:10px;font-weight:600;padding:2px 8px;
  border-radius:20px;letter-spacing:0.04em;font-family:var(--mono);
}
.w-light{background:var(--light-bg);color:var(--light-fg)}
.w-medium{background:var(--medium-bg);color:var(--medium-fg)}
.w-heavy{background:var(--heavy-bg);color:var(--heavy-fg)}
.w-varies{background:var(--varies-bg);color:var(--varies-fg)}

.card-cat{font-size:11px;color:var(--text3)}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;gap:6px;margin-top:2px}
.io-tag{font-size:10px;font-family:var(--mono);color:var(--text3);
  background:var(--bg3);padding:2px 7px;border-radius:4px}

/* ── List view ───────────────────────────────────────────────────── */
.list-view{display:flex;flex-direction:column;gap:2px}
.list-item{
  display:grid;grid-template-columns:1fr 140px 80px 90px;
  align-items:center;gap:12px;
  padding:10px 14px;border-radius:8px;
  border:1px solid transparent;cursor:pointer;
  transition:background .12s,border-color .12s;
}
.list-item:hover{background:var(--bg2);border-color:var(--border)}
.list-item.selected{background:var(--bg2);border-color:var(--accent)}
.li-name{font-size:13px;font-weight:500;color:#fff}
.li-cat{font-size:11px;color:var(--text3);margin-top:2px}
.li-source{font-size:11px;color:var(--text3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-weight{text-align:center}
.li-io{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* ── Detail Panel ────────────────────────────────────────────────── */
.detail-panel{
  width:380px;flex-shrink:0;
  border-left:1px solid var(--border);
  background:var(--bg1);
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent;
  transition:width .2s;
}
.detail-panel.hidden{width:0;overflow:hidden;border:none}

.dp-inner{padding:24px;display:flex;flex-direction:column;gap:0;min-width:320px}
.dp-close{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.dp-close-btn{
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;border-radius:6px;
  padding:5px 10px;font-size:12px;transition:all .12s;
}
.dp-close-btn:hover{background:var(--bg3);color:#fff}

.dp-engine-tag{
  font-size:10px;font-family:var(--mono);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:6px;
}
.dp-title{
  font-family:var(--display);font-size:17px;font-weight:700;
  color:#fff;line-height:1.3;margin-bottom:6px;
}
.dp-cat{font-size:12px;color:var(--text3);margin-bottom:16px}
.dp-divider{height:1px;background:var(--border);margin:16px 0}

.dp-field{margin-bottom:14px}
.dp-field-label{
  font-size:10px;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text3);font-family:var(--mono);margin-bottom:5px;
}
.dp-field-val{font-size:13px;color:var(--text);line-height:1.5}
.dp-field-mono{
  font-size:11px;font-family:var(--mono);color:#98C4FF;
  background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.15);
  padding:10px 12px;border-radius:6px;line-height:1.6;
  white-space:pre-wrap;word-break:break-all;
}
.dp-source{
  font-size:11px;font-family:var(--mono);color:var(--text2);
  background:var(--bg2);border:1px solid var(--border);
  padding:7px 10px;border-radius:6px;
}
.dp-io-row{display:flex;gap:8px}
.dp-io-box{flex:1;background:var(--bg2);border:1px solid var(--border);padding:8px 10px;border-radius:6px}
.dp-io-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);font-family:var(--mono);margin-bottom:4px}
.dp-io-val{font-size:12px;color:var(--text);font-family:var(--mono)}

.weight-badge-lg{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;padding:5px 12px;
  border-radius:6px;font-family:var(--mono);margin-bottom:6px;
}

/* ── Section headers in content ──────────────────────────────────── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 10px;
  border-bottom:1px solid var(--border);margin-bottom:12px;
}
.section-title{
  font-family:var(--display);font-size:13px;font-weight:700;
  color:#fff;display:flex;align-items:center;gap:8px;
}
.section-count{
  font-size:11px;color:var(--text3);font-family:var(--mono);
  background:var(--bg3);padding:2px 8px;border-radius:10px;
}

/* ── Empty state ─────────────────────────────────────────────────── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:12px;color:var(--text3);text-align:center;
}
.empty-icon{font-size:32px;opacity:.4}
.empty-title{font-size:14px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:12px}

/* ── Engine info bar ─────────────────────────────────────────────── */
.engine-info{
  background:var(--bg1);border:1px solid var(--border);
  border-radius:10px;padding:14px 18px;margin-bottom:18px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
.ei-item{display:flex;flex-direction:column;gap:2px}
.ei-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);font-family:var(--mono)}
.ei-val{font-size:12px;color:var(--text);font-family:var(--mono)}
.ei-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}

/* ── Animations ──────────────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.cap-card,.list-item{animation:fadeIn .18s ease both}

/* ── Scrollbar styling ───────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ── Responsive tweaks ───────────────────────────────────────────── */
@media(max-width:900px){
  .sidebar{display:none}
  .detail-panel{position:fixed;right:0;top:0;height:100vh;z-index:100;
    box-shadow:-20px 0 60px rgba(0,0,0,0.5)}
  .grid{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .header-top{flex-direction:column;gap:12px}
  .stats-row{justify-content:flex-start}
  .list-item{grid-template-columns:1fr 80px}
}
</style>
</head>
<body>
<div class="shell">

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-eyebrow">Autodesk Platform Services</div>
      <div class="brand-title">Automation API · Capability Explorer</div>
      <div class="brand-sub">Phase 1 Research — April 2026 · Neeraj Yedekar, Senior PM Developer Enablement</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n" id="stat-total">95</div><div class="stat-l">Capabilities</div></div>
      <div class="stat-div"></div>
      <div class="stat"><div class="stat-n">12</div><div class="stat-l">Categories</div></div>
      <div class="stat-div"></div>
      <div class="stat"><div class="stat-n">5</div><div class="stat-l">Engines</div></div>
      <div class="stat-div"></div>
      <div class="stat"><div class="stat-n" style="color:var(--light-fg)">100%</div><div class="stat-l">Verified</div></div>
    </div>
  </div>
  <div class="engine-tabs" id="engine-tabs">
    <button class="etab active" data-e="Revit" onclick="setEngine('Revit',this)"><span class="dot"></span>Revit</button>
    <button class="etab" data-e="AutoCAD" onclick="setEngine('AutoCAD',this)"><span class="dot"></span>AutoCAD</button>
    <button class="etab" data-e="Inventor" onclick="setEngine('Inventor',this)"><span class="dot"></span>Inventor</button>
    <button class="etab" data-e="3ds Max" onclick="setEngine('3ds Max',this)"><span class="dot"></span>3ds Max</button>
    <button class="etab" data-e="Fusion" onclick="setEngine('Fusion',this)"><span class="dot"></span>Fusion</button>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input class="search-input" id="search" placeholder="Search capabilities…" oninput="renderContent()">
  </div>
  <div class="filter-group">
    <button class="filter-btn" id="f-light"  onclick="toggleFilter('light')" >● Light</button>
    <button class="filter-btn" id="f-medium" onclick="toggleFilter('medium')">● Medium</button>
    <button class="filter-btn" id="f-heavy"  onclick="toggleFilter('heavy')" >● Heavy</button>
    <button class="filter-btn" id="f-varies" onclick="toggleFilter('varies')">● Varies</button>
  </div>
  <div class="view-toggle">
    <button class="vtbtn active" id="vt-grid" onclick="setView('grid')" title="Grid">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
    </button>
    <button class="vtbtn" id="vt-list" onclick="setView('list')" title="List">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="12" width="14" height="2" rx="1"/></svg>
    </button>
  </div>
  <span class="result-count" id="result-count"></span>
</div>

<!-- MAIN -->
<div class="main">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="content" id="content"></div>
  <div class="detail-panel hidden" id="detail-panel">
    <div class="dp-inner" id="dp-inner"></div>
  </div>
</div>

</div><!-- .shell -->

<script>
// ─── Data ────────────────────────────────────────────────────────────────────
const ENGINES = {
"Revit":{
  color:"var(--revit)",scripting:"C# .NET — IExternalDBApplication (RevitAPI.dll only)",
  caps:[
    {cat:"File I/O",name:"Open project file (RVT)",w:"Light",desc:"Open a Revit project file from OSS/ACC storage for read or write operations. Downloaded to working directory before engine starts.",inp:"RVT",out:"—",mech:"rvtApp.OpenDocumentFile(path)",src:"aps-revit-file-parameters-exchange"},
    {cat:"File I/O",name:"Open Revit Cloud model (RCW)",w:"Light",desc:"Open a cloud-workshared Revit model directly in ACC using region + ProjectGuid + ModelGuid. Requires 3-legged OAuth adsk3LeggedToken argument.",inp:"ACC cloud model (C4RModel)",out:"—",mech:"ModelPathUtils.ConvertCloudGUIDsToCloudPath()",src:"aps-revit-rcw-parameters-exchange"},
    {cat:"File I/O",name:"Save / export modified RVT",w:"Light",desc:"Save the modified Revit project file to output, uploaded to OSS or ACC/BIM360.",inp:"RVT (in memory)",out:"RVT",mech:"doc.Save() / doc.SaveAs()",src:"Multiple Revit DA samples"},
    {cat:"File I/O",name:"Open / create Revit Family file (RFA)",w:"Medium",desc:"Open an existing RFA for modification, or create a new RFA from a family template (.rft).",inp:"RFA / RFT",out:"RFA",mech:"rvtApp.NewFamilyDocument(templatePath)",src:"aps-create-revit-family"},

// ── State ─────────────────────────────────────────────────────────────────────
let currentEngine = "Revit";
let selectedCap = null;
let activeFilters = new Set();
let currentView = "grid";
let activeCat = "All";

// ── Category list ─────────────────────────────────────────────────────────────
const CAT_ORDER = ["All","File I/O","Parameter Operations","Data Extraction","Model Creation","Model Modification","Drawing & Documentation Generation","Format Conversion & Export","Rendering & Visualisation","CAM & Manufacturing","Assembly & Component Operations","Scripting & Plugin Execution","Agentic & MCP Integration"];

function getCaps(){
  return ENGINES[currentEngine].caps;
}

function getFilteredCaps(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  return getCaps().filter(c=>{
    const matchWeight = activeFilters.size===0 || activeFilters.has(c.w.toLowerCase().split('/')[0].trim());
    const matchCat = activeCat==="All" || c.cat===activeCat;
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q);
    return matchWeight && matchCat && matchQ;
  });
}

// ── Engine switch ─────────────────────────────────────────────────────────────
function setEngine(eng, el){
  currentEngine = eng;
  activeCat = "All";
  selectedCap = null;
  document.querySelectorAll('.etab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  closeDetail();
  renderSidebar();
  renderContent();
}

// ── View toggle ───────────────────────────────────────────────────────────────
function setView(v){
  currentView = v;
  document.getElementById('vt-grid').classList.toggle('active', v==='grid');
  document.getElementById('vt-list').classList.toggle('active', v==='list');
  renderContent();
}

// ── Filter toggle ─────────────────────────────────────────────────────────────
function toggleFilter(w){
  if(activeFilters.has(w)) activeFilters.delete(w);
  else activeFilters.add(w);
  ['light','medium','heavy','varies'].forEach(x=>{
    const btn = document.getElementById('f-'+x);
    btn.className = 'filter-btn' + (activeFilters.has(x)?' active-'+x:'');
  });
  renderContent();
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  const caps = getCaps();
  const counts = {};
  caps.forEach(c=>{ counts[c.cat]=(counts[c.cat]||0)+1; });
  counts["All"] = caps.length;

  const sb = document.getElementById('sidebar');
  const cats = CAT_ORDER.filter(c=> c==="All" || counts[c]);
  sb.innerHTML = `<div class="sidebar-label">Categories</div>` +
    cats.map(c=>`
      <button class="cat-btn${activeCat===c?' active':''}" onclick="setCategory('${c.replace(/'/g,"\\'")}')">
        <span class="cat-dot"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c}</span>
        <span class="cat-count">${counts[c]||0}</span>
      </button>
    `).join('');
}

function setCategory(cat){
  activeCat = cat;
  selectedCap = null;
  closeDetail();
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim().startsWith(cat.trim().substring(0,10)));
  });
  renderSidebar();
  renderContent();
}

// ── Weight pill HTML ──────────────────────────────────────────────────────────
function wPill(w, large=false){
  const key = w.toLowerCase().includes('light')?'light':w.toLowerCase().includes('medium')?'medium':w.toLowerCase().includes('heavy')?'heavy':'varies';
  const cls = large?'weight-badge-lg':'weight-pill w-'+key;
  return `<span class="${cls} w-${key}">${w}</span>`;
}

// ── Main content render ───────────────────────────────────────────────────────
function renderContent(){
  const filtered = getFilteredCaps();
  document.getElementById('result-count').textContent = `${filtered.length} of ${getCaps().length} capabilities`;

  const el = document.getElementById('content');

  if(filtered.length===0){
    el.innerHTML = `<div class="empty"><div class="empty-icon">⌕</div><div class="empty-title">No capabilities match</div><div class="empty-sub">Try adjusting your search or filters</div></div>`;
    return;
  }

  // Engine info bar
  const eng = ENGINES[currentEngine];
  const counts = {Light:0,Medium:0,Heavy:0,Varies:0};
  getCaps().forEach(c=>{ const k=c.w.split('/')[0].trim(); if(counts[k]!==undefined) counts[k]++; else counts.Varies++; });
  const infoBar = `<div class="engine-info">
    <div class="ei-item"><div class="ei-label">Scripting</div><div class="ei-val" style="font-size:11px">${eng.scripting}</div></div>
    <div class="ei-divider"></div>
    <div class="ei-item"><div class="ei-label">Total</div><div class="ei-val" style="color:${eng.color}">${getCaps().length} caps</div></div>
    <div class="ei-divider"></div>
    <div class="ei-item"><div class="ei-label">Light</div><div class="ei-val" style="color:var(--light-fg)">${counts.Light}</div></div>
    <div class="ei-item"><div class="ei-label">Medium</div><div class="ei-val" style="color:var(--medium-fg)">${counts.Medium}</div></div>
    <div class="ei-item"><div class="ei-label">Heavy</div><div class="ei-val" style="color:var(--heavy-fg)">${counts.Heavy}</div></div>
    ${counts.Varies>0?`<div class="ei-item"><div class="ei-label">Varies</div><div class="ei-val" style="color:var(--varies-fg)">${counts.Varies}</div></div>`:''}
  </div>`;

  if(currentView==='grid'){
    // Group by category
    const groups = {};
    filtered.forEach(c=>{ if(!groups[c.cat]) groups[c.cat]=[]; groups[c.cat].push(c); });
    const orderedCats = CAT_ORDER.filter(c=>groups[c]);

    const html = orderedCats.map(cat=>`
      <div class="section-header">
        <div class="section-title">${cat} <span class="section-count">${groups[cat].length}</span></div>
      </div>
      <div class="grid" style="margin-bottom:24px">
        ${groups[cat].map((cap,i)=>`
          <div class="cap-card${selectedCap===cap?' selected':''}" 
               onclick="showDetail(${JSON.stringify(cap).replace(/"/g,'&quot;')})"
               style="animation-delay:${i*0.02}s">
            <div class="card-top">
              <div class="card-name">${cap.name}</div>
              ${wPill(cap.w)}
            </div>
            <div class="card-desc">${cap.desc}</div>
            <div class="card-footer">
              <span class="io-tag">in: ${cap.inp.length>22?cap.inp.substring(0,22)+'…':cap.inp}</span>
              <span class="io-tag">out: ${cap.out.length>18?cap.out.substring(0,18)+'…':cap.out}</span>
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');
    el.innerHTML = infoBar + html;

  } else {
    // List view
    const header = `<div class="list-item" style="cursor:default;opacity:.6;padding:6px 14px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono)">Capability</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono)">Source</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);text-align:center">Weight</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono)">I/O</div>
    </div>`;
    const rows = filtered.map(cap=>`
      <div class="list-item${selectedCap===cap?' selected':''}" onclick="showDetail(${JSON.stringify(cap).replace(/"/g,'&quot;')})">
        <div>
          <div class="li-name">${cap.name}</div>
          <div class="li-cat">${cap.cat}</div>
        </div>
        <div class="li-source">${cap.src}</div>
        <div class="li-weight">${wPill(cap.w)}</div>
        <div class="li-io">${cap.inp.substring(0,16)} → ${cap.out.substring(0,12)}</div>
      </div>
    `).join('');
    el.innerHTML = infoBar + `<div class="list-view">${header}${rows}</div>`;
  }
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function showDetail(cap){
  if(typeof cap === 'string') cap = JSON.parse(cap);
  selectedCap = cap;
  const eng = ENGINES[currentEngine];
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');

  const wKey = cap.w.toLowerCase().includes('light')?'light':cap.w.toLowerCase().includes('medium')?'medium':cap.w.toLowerCase().includes('heavy')?'heavy':'varies';

  document.getElementById('dp-inner').innerHTML = `
    <div class="dp-close">
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">Detail</span>
      <button class="dp-close-btn" onclick="closeDetail()">✕ Close</button>
    </div>
    <div class="dp-engine-tag" style="color:${eng.color}">${currentEngine} · ${cap.cat}</div>
    <div class="dp-title">${cap.name}</div>
    ${wPill(cap.w, true)}
    <div class="dp-divider"></div>
    <div class="dp-field">
      <div class="dp-field-label">Description</div>
      <div class="dp-field-val">${cap.desc}</div>
    </div>
    <div class="dp-io-row">
      <div class="dp-io-box">
        <div class="dp-io-label">Input</div>
        <div class="dp-io-val">${cap.inp}</div>
      </div>
      <div class="dp-io-box">
        <div class="dp-io-label">Output</div>
        <div class="dp-io-val">${cap.out}</div>
      </div>
    </div>
    <div class="dp-divider"></div>
    <div class="dp-field">
      <div class="dp-field-label">Code Mechanism</div>
      <div class="dp-field-mono">${cap.mech}</div>
    </div>
    <div class="dp-divider"></div>
    <div class="dp-field">
      <div class="dp-field-label">Primary Source</div>
      <div class="dp-source">${cap.src}</div>
    </div>
  `;
}

function closeDetail(){
  document.getElementById('detail-panel').classList.add('hidden');
  selectedCap = null;
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderSidebar();
renderContent();
</script>
</body>
</html>
