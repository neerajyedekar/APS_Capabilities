<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automation API · Capability Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F14;--bg1:#13161D;--bg2:#1A1E28;--bg3:#222738;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.14);
  --t1:#F0F1F3;--t2:#9AA0AD;--t3:#555E6E;
  --blue:#0696D7;--blue2:#3DAFEA;
  --rv:#34C78A;--ac:#4F8EF7;--iv:#F5A623;--mx:#E05B5B;--fu:#A78BFA;
  --lb:#1a2f1f;--lf:#34C78A;--mb:#2c2208;--mf:#F5A623;
  --hb:#2b1212;--hf:#E05B5B;--vb:#1e1830;--vf:#A78BFA;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif}

/* NAV */
.nav{
  height:46px;display:flex;align-items:center;padding:0 18px;gap:12px;
  background:var(--bg1);border-bottom:1px solid var(--line);
  position:relative;z-index:100;flex-shrink:0;
}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-logo img{height:14px;width:auto}
.nav-logo-fallback{font-size:12px;font-weight:600;letter-spacing:0.1em;color:#fff;text-transform:uppercase}
.nav-sep{width:1px;height:16px;background:var(--line2)}
.nav-title{font-size:12px;color:var(--t2)}
.nav-links{display:flex;margin-left:auto}
.nav-link{font-size:11px;color:var(--t3);text-decoration:none;padding:0 10px;line-height:46px;transition:color .15s}
.nav-link:hover{color:var(--t2)}
@media(max-width:500px){.nav-links{display:none}}

/* LEGEND / CONTROLS */
.controls{
  display:flex;align-items:center;gap:12px;padding:8px 18px;
  background:var(--bg1);border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap;
}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.l-item{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 8px;border-radius:5px;border:1px solid transparent;transition:all .15s}
.l-item:hover{background:var(--bg2)}
.l-item.active{border-color:var(--line2);background:var(--bg2)}
.l-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.l-name{font-size:11px;font-weight:500}
.ctrl-btns{display:flex;gap:6px;margin-left:auto}
.ctrl-btn{
  padding:4px 12px;border-radius:5px;border:1px solid var(--line);background:var(--bg2);
  color:var(--t2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;
}
.ctrl-btn:hover{color:var(--t1);border-color:var(--line2)}
.ctrl-btn.on{background:var(--bg3);color:var(--t1)}
.zoom-hint{font-size:11px;color:var(--t3)}
@media(max-width:600px){.zoom-hint{display:none}}

/* MAIN CANVAS AREA */
.canvas{flex:1;position:relative;overflow:hidden;display:flex}
svg.graph{width:100%;height:100%;cursor:grab}
svg.graph:active{cursor:grabbing}

/* TOOLTIP */
.tip{
  position:absolute;pointer-events:none;opacity:0;
  background:var(--bg2);border:1px solid var(--line2);border-radius:8px;
  padding:10px 14px;max-width:260px;z-index:200;
  transition:opacity .12s;font-size:12px;line-height:1.5;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.tip-engine{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.tip-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px}
.tip-cat{font-size:11px;color:var(--t3);margin-bottom:6px}
.tip-desc{font-size:12px;color:var(--t2)}
.tip-mech{font-size:10px;font-family:'JetBrains Mono',monospace;color:#7EC8F5;margin-top:6px;background:rgba(6,150,215,.08);padding:4px 7px;border-radius:4px}

/* DETAIL PANEL */
.dp{
  position:absolute;right:0;top:0;bottom:0;width:320px;
  background:var(--bg1);border-left:1px solid var(--line);
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent;
  transform:translateX(100%);transition:transform .2s;z-index:50;
}
.dp.open{transform:translateX(0)}
@media(max-width:768px){
  .dp{position:fixed;bottom:0;left:0;right:0;width:100%;height:55vh;
      top:auto;border:none;border-top:1px solid var(--line2);border-radius:12px 12px 0 0;
      transform:translateY(100%)}
  .dp.open{transform:translateY(0)}
}
.dp-pad{padding:18px}
.dp-close{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.dp-x{background:var(--bg2);border:1px solid var(--line);border-radius:5px;color:var(--t2);font-size:11px;cursor:pointer;padding:3px 9px;font-family:'Inter',sans-serif;transition:all .12s}
.dp-x:hover{color:#fff;background:var(--bg3)}
.dp-eng-tag{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px}
.dp-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.3}
.dp-cat{font-size:12px;color:var(--t3);margin-bottom:10px}
.dp-div{height:1px;background:var(--line);margin:12px 0}
.dp-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.dp-val{font-size:12px;color:var(--t1);line-height:1.5;margin-bottom:10px}
.dp-code{font-size:10px;font-family:'JetBrains Mono',monospace;color:#7EC8F5;background:rgba(6,150,215,.07);border:1px solid rgba(6,150,215,.14);padding:8px 10px;border-radius:5px;line-height:1.6;word-break:break-all;margin-bottom:10px}
.dp-src{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t2);background:var(--bg2);border:1px solid var(--line);padding:6px 9px;border-radius:5px}
.io-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.io-box{background:var(--bg2);border:1px solid var(--line);padding:7px 9px;border-radius:5px}
.io-bl{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:3px}
.io-bv{font-size:11px;color:var(--t1);font-family:'JetBrains Mono',monospace}
.w-pill{display:inline-flex;font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px;font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.wl{background:var(--lb);color:var(--lf)} .wm{background:var(--mb);color:var(--mf)}
.wh{background:var(--hb);color:var(--hf)} .wv{background:var(--vb);color:var(--vf)}

/* Mobile overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
.overlay.on{display:block}
@media(min-width:769px){.overlay{display:none!important}}

/* LIST FALLBACK for small screens */
.list-mode{display:none;flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin}
.list-mode.on{display:block}
.lm-eng{margin-bottom:20px}
.lm-eng-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#fff;margin-bottom:8px}
.lm-eng-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lm-cap{padding:8px 12px;border-radius:6px;border:1px solid var(--line);background:var(--bg1);
  margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .12s}
.lm-cap:hover{background:var(--bg2);border-color:var(--line2)}
.lm-name{font-size:12px;font-weight:500;flex:1}
.lm-cat{font-size:10px;color:var(--t3)}

body{display:flex;flex-direction:column;height:100%}
.body-wrap{display:flex;flex:1;overflow:hidden;position:relative}
</style>
</head>

<div class="body-wrap">

</div>
<div class="overlay" id="overlay" onclick="closeDP()"></div>

// ── Build tree hierarchy ───────────────────────────────────────────────────────
function buildTree(){
  const root={name:'Automation API',type:'root',children:[]};
  const engMap={};
  CAPS.forEach(cap=>{
    if(!engMap[cap.e]){
      const node={name:cap.e,type:'engine',col:ENG_META[cap.e].col,children:[],count:0};
      engMap[cap.e]=node;
      root.children.push(node);
    }
    const eng=engMap[cap.e];
    let catNode=eng.children.find(c=>c.name===cap.c);
    if(!catNode){catNode={name:cap.c,type:'category',col:eng.col,children:[]};eng.children.push(catNode)}
    catNode.children.push({...cap,type:'capability'});
    eng.count++;
  });
  return root;
}

// ── State ─────────────────────────────────────────────────────────────────────
const tree=buildTree();
let mode='map';
let currentDetail=null;
let filteredEng=new Set(Object.keys(ENG_META));

// ── Legend ────────────────────────────────────────────────────────────────────
function renderLegend(){
  const lg=document.getElementById('legend');
  lg.innerHTML=Object.entries(ENG_META).map(([e,m])=>`
    <div class="l-item active" id="leg-${e.replace(/ /g,'_')}" onclick="toggleEng('${e}')">
      <div class="l-dot" style="background:${m.col}"></div>
      <span class="l-name" style="color:${m.col}">${e}</span>
    </div>`).join('');
}
function toggleEng(e){
  if(filteredEng.has(e))filteredEng.delete(e);else filteredEng.add(e);
  const el=document.getElementById('leg-'+e.replace(/ /g,'_'));
  if(el)el.classList.toggle('active',filteredEng.has(e));
  if(mode==='map')drawMindMap();else renderList();
}

// ── D3 MIND MAP ───────────────────────────────────────────────────────────────
let svg,g,zoom;
const TIP=document.getElementById('tip');

function drawMindMap(){
  const container=document.getElementById('canvas');
  const W=container.clientWidth,H=container.clientHeight;
  d3.select('#svg').selectAll('*').remove();
  svg=d3.select('#svg').attr('width',W).attr('height',H);
  g=svg.append('g');

  // filter by active engines
  const filteredTree=JSON.parse(JSON.stringify(tree));
  filteredTree.children=filteredTree.children.filter(e=>filteredEng.has(e.name));

  const hierarchy=d3.hierarchy(filteredTree);
  const numEngines=filteredTree.children.length;
  const R=Math.min(W,H)*0.38;

  // Radial tree layout
  const layout=d3.tree()
    .size([2*Math.PI,R])
    .separation((a,b)=>a.parent===b.parent?1:1.5);
  layout(hierarchy);

  // Convert to x/y
  hierarchy.each(d=>{
    const a=d.x,r=d.y;
    d.px=r*Math.cos(a-Math.PI/2);
    d.py=r*Math.sin(a-Math.PI/2);
  });

  // Links
  const linkGen=d3.linkRadial().angle(d=>d.x).radius(d=>d.y);
  g.selectAll('.link')
    .data(hierarchy.links())
    .join('path')
    .attr('class','link')
    .attr('fill','none')
    .attr('stroke',d=>{
      const eng=d.target.depth===1?d.target.data.name:
                d.target.depth>=2?d.target.ancestors().find(a=>a.depth===1)?.data.name:null;
      return eng?ENG_META[eng]?.col+'40':'rgba(255,255,255,0.1)';
    })
    .attr('stroke-width',d=>d.target.depth===1?1.5:d.target.depth===2?1:0.5)
    .attr('d',linkGen)
    .attr('transform',`translate(${W/2},${H/2})`);

  // Nodes
  const nodeG=g.selectAll('.node')
    .data(hierarchy.descendants())
    .join('g')
    .attr('class','node')
    .attr('transform',d=>`translate(${d.px+W/2},${d.py+H/2})`)
    .style('cursor',d=>d.data.type==='capability'?'pointer':'default');

  // Circles
  nodeG.append('circle')
    .attr('r',d=>{
      if(d.data.type==='root')return 22;
      if(d.data.type==='engine')return 16;
      if(d.data.type==='category')return 9;
      return 4.5;
    })
    .attr('fill',d=>{
      if(d.data.type==='root')return '#0696D7';
      if(d.data.type==='engine')return d.data.col;
      if(d.data.type==='category')return d.data.col+'50';
      const wk=(d.data.w||'').toLowerCase().split('/')[0].trim();
      return wk==='light'?'#34C78A40':wk==='medium'?'#F5A62340':wk==='heavy'?'#E05B5B40':'#A78BFA40';
    })
    .attr('stroke',d=>{
      if(d.data.type==='root')return '#0696D7';
      if(d.data.type==='engine')return d.data.col;
      if(d.data.type==='category')return d.data.col+'90';
      const wk=(d.data.w||'').toLowerCase().split('/')[0].trim();
      return wk==='light'?'#34C78A':wk==='medium'?'#F5A623':wk==='heavy'?'#E05B5B':'#A78BFA';
    })
    .attr('stroke-width',d=>d.data.type==='root'?2:d.data.type==='engine'?2:1)
    .on('mouseover',function(event,d){
      if(d.data.type==='capability')showTip(event,d.data);
      d3.select(this).attr('stroke-width',d.data.type==='capability'?2:d.data.type==='category'?2:3);
    })
    .on('mousemove',function(event){moveTip(event)})
    .on('mouseout',function(event,d){
      hideTip();
      d3.select(this).attr('stroke-width',d.data.type==='root'?2:d.data.type==='engine'?2:1);
    })
    .on('click',function(event,d){
      event.stopPropagation();
      if(d.data.type==='capability')showDP(d.data);
    });

  // Root label
  nodeG.filter(d=>d.data.type==='root')
    .append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('fill','#fff').attr('font-size','8px').attr('font-weight','600')
    .attr('font-family','JetBrains Mono, monospace')
    .text('API');

  // Engine labels
  nodeG.filter(d=>d.data.type==='engine')
    .append('text')
    .attr('text-anchor',d=>d.px>0?'start':'end')
    .attr('x',d=>d.px>0?20:-20)
    .attr('dominant-baseline','central')
    .attr('fill',d=>d.data.col)
    .attr('font-size','11px').attr('font-weight','600')
    .attr('font-family','Inter, sans-serif')
    .text(d=>d.data.name);

  // Category labels (abbreviated)
  nodeG.filter(d=>d.data.type==='category')
    .append('text')
    .attr('text-anchor',d=>d.px>2?'start':'end')
    .attr('x',d=>d.px>2?13:-13)
    .attr('dominant-baseline','central')
    .attr('fill',d=>d.data.col)
    .attr('font-size','9px').attr('font-weight','500')
    .attr('font-family','Inter, sans-serif')
    .text(d=>{
      const abbr={'File I/O':'File I/O','Parameter Operations':'Params','Data Extraction':'Extract','Model Creation':'Create','Model Modification':'Modify','Drawing & Documentation':'Drawings','Format Conversion & Export':'Export','Rendering & Visualisation':'Render','CAM & Manufacturing':'CAM','Assembly & Component Ops':'Assembly','Scripting & Plugin Exec':'Scripting','Agentic & MCP':'MCP'};
      return abbr[d.data.name]||d.data.name.substring(0,10);
    });

  // Zoom setup
  zoom=d3.zoom().scaleExtent([0.2,4]).on('zoom',e=>{g.attr('transform',e.transform)});
  svg.call(zoom).on('dblclick.zoom',null);

  // Click background to close detail
  svg.on('click',()=>closeDP());
}

function showTip(event,cap){
  const eng=ENG_META[cap.e];
  TIP.innerHTML=`
    <div class="tip-engine" style="color:${eng.col}">${cap.e} · ${cap.c}</div>
    <div class="tip-name">${cap.n}</div>
    <div class="tip-desc">${cap.d.substring(0,100)}${cap.d.length>100?'…':''}</div>
    <div class="tip-mech">${cap.m.substring(0,60)}${cap.m.length>60?'…':''}</div>`;
  TIP.style.opacity=1;moveTip(event);
}
function moveTip(event){
  const x=event.clientX+14,y=event.clientY-10;
  const tw=280;const ww=window.innerWidth;
  TIP.style.left=(x+tw>ww?x-tw-28:x)+'px';
  TIP.style.top=Math.max(10,y)+'px';
}
function hideTip(){TIP.style.opacity=0}

function resetView(){
  if(!svg||!zoom)return;
  const container=document.getElementById('canvas');
  const W=container.clientWidth,H=container.clientHeight;
  svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(1).translate(-W/2,-H/2));
}

            <div class="lm-cat">${cap.c}</div>
          </div>
          <span class="w-pill ${wCls(cap.w)}" style="font-size:9px;padding:1px 6px">${cap.w}</span>
        </div>`).join('')}
    </div>`).join('');
}

function wCls(w){const k=w.toLowerCase().split('/')[0].trim();return k==='light'?'wl':k==='medium'?'wm':k==='heavy'?'wh':'wv'}

function setMode(m){
  mode=m;
  document.getElementById('btn-map').classList.toggle('on',m==='map');
  document.getElementById('btn-list').classList.toggle('on',m==='list');
  document.getElementById('canvas').style.display=m==='map'?'flex':'none';
  document.getElementById('list-mode').classList.toggle('on',m==='list');
  if(m==='map')drawMindMap();else renderList();
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function showDP(cap){
  if(typeof cap==='string')cap=JSON.parse(cap);
  currentDetail=cap;
  const eng=ENG_META[cap.e];
  const wk=(cap.w||'').toLowerCase().split('/')[0].trim();
  document.getElementById('dp-in').innerHTML=`
    <div class="dp-close">
      <span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:.08em">Capability</span>
      <button class="dp-x" onclick="closeDP()">✕</button>
    </div>
    <div class="dp-eng-tag" style="color:${eng.col}">${cap.e} · ${cap.c}</div>
    <div class="dp-title">${cap.n}</div>
    <span class="w-pill ${wCls(cap.w)}">${cap.w}</span>
    <div class="dp-div"></div>
    <div class="dp-lbl">Description</div>
    <div class="dp-val">${cap.d}</div>
    <div class="io-row">
      <div class="io-box"><div class="io-bl">Input</div><div class="io-bv">${cap.i}</div></div>
      <div class="io-box"><div class="io-bl">Output</div><div class="io-bv">${cap.o}</div></div>
    </div>
    <div class="dp-div"></div>
    <div class="dp-lbl">Code Mechanism</div>
    <div class="dp-code">${cap.m}</div>
    <div class="dp-lbl">Primary Source</div>
    <div class="dp-src">${cap.s}</div>`;
  document.getElementById('dp').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}
function closeDP(){
  document.getElementById('dp').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
  currentDetail=null;
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderLegend();
drawMindMap();

// Responsive resize
let resizeT;
window.addEventListener('resize',()=>{
  clearTimeout(resizeT);
  resizeT=setTimeout(()=>{if(mode==='map')drawMindMap()},200);
});

// Mobile: default to list if small screen
if(window.innerWidth<600)setMode('list');
</script>
</body>
</html>
