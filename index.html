<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automation API · Capability Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:    #111213;
  --bg1:   #18191C;
  --bg2:   #1F2126;
  --bg3:   #272A31;
  --bg4:   #2F333C;
  --line:  rgba(255,255,255,0.07);
  --line2: rgba(255,255,255,0.12);
  --t1:    #F0F1F3;
  --t2:    #9AA0AD;
  --t3:    #555E6E;
  --blue:  #0696D7;
  --blue2: #3DAFEA;
  --mono:  'JetBrains Mono', monospace;
  --sans:  'Inter', sans-serif;
  /* Engine */
  --rv:#34C78A; --ac:#4F8EF7; --iv:#F5A623; --mx:#E05B5B; --fu:#A78BFA;
  /* Weight */
  --lb:#172B1F; --lf:#34C78A;
  --mb:#2B2007; --mf:#F5A623;
  --hb:#2B1212; --hf:#E05B5B;
  --vb:#1E1830; --vf:#A78BFA;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);font-size:14px;color:var(--t1);background:var(--bg);display:flex;flex-direction:column}

/* ── NAV ── */
.nav{
  height:48px;background:var(--bg1);border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;
  position:relative;z-index:50;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.nav-logo img{height:16px;width:auto;display:block}
.nav-logo-fallback{
  font-size:13px;font-weight:600;letter-spacing:0.08em;color:#fff;
  text-transform:uppercase;font-family:var(--sans);
}
.nav-sep{width:1px;height:18px;background:var(--line2);flex-shrink:0}
.nav-title{font-size:13px;color:var(--t2);font-weight:400;white-space:nowrap}
.nav-links{display:flex;gap:0;margin-left:auto}
.nav-link{
  font-size:12px;color:var(--t3);text-decoration:none;
  padding:0 12px;line-height:48px;transition:color .15s;white-space:nowrap;
}
.nav-link:hover{color:var(--t2)}
@media(max-width:600px){.nav-links{display:none}}

/* ── ENGINE TABS ── */
.eng-bar{
  background:var(--bg1);border-bottom:1px solid var(--line);
  display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.eng-bar::-webkit-scrollbar{display:none}
.etab{
  display:flex;align-items:center;gap:6px;padding:0 18px;height:42px;
  border:none;border-bottom:2px solid transparent;background:none;
  cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;
  color:var(--t3);white-space:nowrap;transition:color .15s,border-color .15s;
  flex-shrink:0;
}
.etab:hover{color:var(--t2)}
.etab .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:opacity .15s;opacity:.4}
.etab .cnt{font-size:11px;background:var(--bg3);padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.etab.active .dot{opacity:1}
.etab[data-e="Revit"]   .dot{background:var(--rv)}  .etab[data-e="Revit"].active{color:var(--rv);border-color:var(--rv)}
.etab[data-e="AutoCAD"] .dot{background:var(--ac)}  .etab[data-e="AutoCAD"].active{color:var(--ac);border-color:var(--ac)}
.etab[data-e="Inventor"].dot{background:var(--iv)}  .etab[data-e="Inventor"].active{color:var(--iv);border-color:var(--iv)}
.etab[data-e="3ds Max"] .dot{background:var(--mx)}  .etab[data-e="3ds Max"].active{color:var(--mx);border-color:var(--mx)}
.etab[data-e="Fusion"]  .dot{background:var(--fu)}  .etab[data-e="Fusion"].active{color:var(--fu);border-color:var(--fu)}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  border-bottom:1px solid var(--line);background:var(--bg1);flex-shrink:0;
  flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:320px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;display:flex}
.search-input{
  width:100%;padding:7px 10px 7px 32px;background:var(--bg2);
  border:1px solid var(--line);border-radius:7px;
  color:var(--t1);font-family:var(--sans);font-size:13px;outline:none;
  transition:border-color .15s;
}
.search-input::placeholder{color:var(--t3)}
.search-input:focus{border-color:var(--blue)}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{
  padding:4px 10px;border-radius:5px;border:1px solid var(--line);
  background:var(--bg2);color:var(--t3);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--sans);
}
.chip:hover{color:var(--t2);border-color:var(--line2)}
.chip.on-l{background:var(--lb);border-color:var(--lf);color:var(--lf)}
.chip.on-m{background:var(--mb);border-color:var(--mf);color:var(--mf)}
.chip.on-h{background:var(--hb);border-color:var(--hf);color:var(--hf)}
.chip.on-v{background:var(--vb);border-color:var(--vf);color:var(--vf)}
.vtoggle{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-left:auto;flex-shrink:0}
.vbtn{padding:6px 10px;background:var(--bg2);border:none;color:var(--t3);cursor:pointer;transition:all .12s}
.vbtn.on{background:var(--bg3);color:var(--t1)}
.result-c{font-size:11px;color:var(--t3);white-space:nowrap;font-family:var(--mono);padding-left:4px}

/* ── BODY LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;min-height:0}

/* Sidebar */
.sidebar{
  width:188px;flex-shrink:0;border-right:1px solid var(--line);
  background:var(--bg1);overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--bg4) transparent;
}
@media(max-width:768px){.sidebar{display:none}}
.sl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);padding:14px 14px 6px;font-family:var(--mono)}
.sb-btn{
  display:flex;align-items:center;gap:6px;width:100%;padding:6px 14px;
  border:none;background:none;cursor:pointer;font-family:var(--sans);
  font-size:12px;color:var(--t2);text-align:left;transition:all .1s;
}
.sb-btn:hover{background:var(--bg2);color:var(--t1)}
.sb-btn.on{background:var(--bg2);color:#fff;font-weight:500}
.sb-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;opacity:0}
.sb-btn.on .sb-dot{opacity:1}
.sb-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.sb-n{font-size:10px;font-family:var(--mono);color:var(--t3);background:var(--bg3);padding:1px 5px;border-radius:8px;flex-shrink:0}
.sb-btn.on .sb-n{background:rgba(6,150,215,.15);color:var(--blue)}

/* Content */
.content{flex:1;overflow-y:auto;padding:18px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;min-width:0}

/* ── ENGINE META BAR ── */
.meta-bar{
  background:var(--bg2);border:1px solid var(--line);border-radius:8px;
  padding:11px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;
}
.mb-item{display:flex;flex-direction:column;gap:2px}
.mb-l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:var(--mono)}
.mb-v{font-size:12px;color:var(--t1);font-family:var(--mono)}
.mb-div{width:1px;height:24px;background:var(--line2);flex-shrink:0}
@media(max-width:500px){.meta-bar{gap:10px}.mb-div{display:none}}

/* ── SECTION ── */
.sec-hdr{
  display:flex;align-items:center;gap:8px;
  padding:12px 0 8px;margin-bottom:10px;
  border-bottom:1px solid var(--line);
}
.sec-title{font-size:12px;font-weight:600;color:var(--t1)}
.sec-n{font-size:10px;color:var(--t3);background:var(--bg3);padding:1px 7px;border-radius:8px;font-family:var(--mono)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-bottom:22px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

.card{
  background:var(--bg2);border:1px solid var(--line);border-radius:8px;
  padding:14px;cursor:pointer;transition:border-color .15s,background .12s,transform .12s;
  display:flex;flex-direction:column;gap:7px;
}
.card:hover{border-color:var(--line2);background:var(--bg3);transform:translateY(-1px)}
.card.sel{border-color:var(--blue)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:13px;font-weight:500;color:#fff;line-height:1.3;flex:1}
.wpill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:12px;flex-shrink:0;font-family:var(--mono);white-space:nowrap}
.wl{background:var(--lb);color:var(--lf)} .wm{background:var(--mb);color:var(--mf)}
.wh{background:var(--hb);color:var(--hf)} .wv{background:var(--vb);color:var(--vf)}
.card-desc{font-size:12px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-io{display:flex;gap:5px;flex-wrap:wrap}
.io-tag{font-size:10px;font-family:var(--mono);color:var(--t3);background:var(--bg3);padding:2px 6px;border-radius:4px}

/* ── LIST ── */
.list-view{display:flex;flex-direction:column;gap:2px;margin-bottom:22px}
.li{
  display:grid;grid-template-columns:1fr 100px 70px;align-items:center;gap:10px;
  padding:9px 12px;border-radius:7px;border:1px solid transparent;
  cursor:pointer;transition:all .1s;
}
.li:hover{background:var(--bg2);border-color:var(--line)}
.li.sel{background:var(--bg2);border-color:var(--blue)}
.li-name{font-size:13px;font-weight:500;color:#fff}
.li-cat{font-size:11px;color:var(--t3);margin-top:2px}
.li-src{font-size:10px;color:var(--t3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:500px){.li{grid-template-columns:1fr 70px}}

/* ── DETAIL PANEL ── */
.dp{
  width:360px;flex-shrink:0;border-left:1px solid var(--line);
  background:var(--bg1);overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--bg4) transparent;transition:width .18s;
}
.dp.hidden{width:0;overflow:hidden;border:none}
@media(max-width:768px){
  .dp{
    position:fixed;bottom:0;left:0;right:0;width:100%!important;
    height:60vh;border:none;border-top:1px solid var(--line2);
    border-radius:16px 16px 0 0;z-index:200;
    box-shadow:0 -20px 60px rgba(0,0,0,.5);
  }
  .dp.hidden{height:0;overflow:hidden;border:none}
}
.dp-in{padding:20px;min-width:0}
.dp-close-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.dp-close-btn{
  background:var(--bg2);border:1px solid var(--line);border-radius:6px;
  color:var(--t2);font-size:12px;cursor:pointer;padding:4px 10px;
  transition:all .12s;font-family:var(--sans);
}
.dp-close-btn:hover{background:var(--bg3);color:#fff}
.dp-eng{font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.dp-title{font-size:16px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:8px}
.dp-cat{font-size:12px;color:var(--t3);margin-bottom:16px}
.dp-div{height:1px;background:var(--line);margin:14px 0}
.dp-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);font-family:var(--mono);margin-bottom:5px}
.dp-val{font-size:13px;color:var(--t1);line-height:1.5;margin-bottom:12px}
.dp-code{
  font-size:11px;font-family:var(--mono);color:#7EC8F5;
  background:rgba(6,150,215,.07);border:1px solid rgba(6,150,215,.15);
  padding:10px 12px;border-radius:6px;line-height:1.6;
  white-space:pre-wrap;word-break:break-all;margin-bottom:12px;
}
.dp-src{font-size:11px;font-family:var(--mono);color:var(--t2);background:var(--bg2);border:1px solid var(--line);padding:7px 10px;border-radius:6px}
.io-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.io-box{background:var(--bg2);border:1px solid var(--line);padding:8px 10px;border-radius:6px}
.io-bl{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:3px}
.io-bv{font-size:11px;color:var(--t1);font-family:var(--mono)}
.wbig{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:6px;font-family:var(--mono);margin-bottom:14px;
}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 20px;gap:10px;color:var(--t3)}
.empty svg{opacity:.3}
.empty-t{font-size:14px;font-weight:500;color:var(--t2)}
.empty-s{font-size:12px}

/* Mobile detail overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
.overlay.on{display:block}
@media(min-width:769px){.overlay{display:none!important}}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>

<!-- NAV -->
<nav class="nav">
  <a href="https://aps.autodesk.com" target="_blank" class="nav-logo" aria-label="Autodesk Platform Services">

<!-- ENGINE TABS -->
<div class="eng-bar" id="eng-bar">
  <button class="etab active" data-e="Revit"    onclick="setEng('Revit',this)">   <span class="dot"></span>Revit    <span class="cnt">26</span></button>
  <button class="etab"        data-e="AutoCAD"  onclick="setEng('AutoCAD',this)"> <span class="dot"></span>AutoCAD  <span class="cnt">19</span></button>
  <button class="etab"        data-e="Inventor" onclick="setEng('Inventor',this)"><span class="dot"></span>Inventor <span class="cnt">20</span></button>
  <button class="etab"        data-e="3ds Max"  onclick="setEng('3ds Max',this)"> <span class="dot"></span>3ds Max  <span class="cnt">19</span></button>
  <button class="etab"        data-e="Fusion"   onclick="setEng('Fusion',this)">  <span class="dot"></span>Fusion   <span class="cnt">14</span></button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input class="search-input" id="search" placeholder="Search capabilities…" oninput="render()">
  </div>
  <div class="chips">
    <button class="chip" id="fc-l" onclick="toggleF('light')">Light</button>
    <button class="chip" id="fc-m" onclick="toggleF('medium')">Medium</button>
    <button class="chip" id="fc-h" onclick="toggleF('heavy')">Heavy</button>
    <button class="chip" id="fc-v" onclick="toggleF('varies')">Varies</button>
  </div>
  <div class="vtoggle">
    <button class="vbtn on" id="vt-g" onclick="setView('grid')" title="Grid">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
    </button>
    <button class="vbtn" id="vt-l" onclick="setView('list')" title="List">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="12" width="14" height="2" rx="1"/></svg>
    </button>
  </div>
  <span class="result-c" id="rc"></span>
</div>

<!-- BODY -->
<div class="body">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="content" id="content"></div>
  <div class="dp hidden" id="dp"><div class="dp-in" id="dp-in"></div></div>
</div>
<div class="overlay" id="overlay" onclick="closeDP()"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const ENG={

  {c:"File I/O",n:"Open Revit Cloud model (RCW)",w:"Light",d:"Open a cloud-workshared Revit model directly in ACC using region, ProjectGuid, and ModelGuid. Requires 3-legged OAuth via the adsk3LeggedToken WorkItem argument.",i:"ACC cloud model (C4RModel)",o:"—",m:"ModelPathUtils.ConvertCloudGUIDsToCloudPath()",s:"aps-revit-rcw-parameters-exchange"},

  {c:"File I/O",n:"Open / create Revit Family file (RFA)",w:"Medium",d:"Open an existing RFA for modification, or create a new RFA from a family template (.rft).",i:"RFA / RFT",o:"RFA",m:"rvtApp.NewFamilyDocument(templatePath)",s:"aps-create-revit-family"},
  {c:"File I/O",n:"Upgrade Revit file version",w:"Medium",d:"Open a Revit file from an older version in the current engine and save it, upgrading the file format. Supports batch upgrades via parallel WorkItems.",i:"RVT/RFA (older version)",o:"RVT/RFA (upgraded)",m:"Open with current engine; auto-upgrades on open",s:"aps-upgrade-revit-files"},
  {c:"File I/O",n:"Migrate Revit Cloud models between ACC projects",w:"Heavy",d:"Move RCW models from one BIM360/ACC project to another, including version migration to Revit 2025 or 2026.",i:"ACC RCW model",o:"ACC RCW model (destination)",m:"RCW migration logic; 3-legged token for source + destination",s:"aps-revit-rcw-migrate-automation"},
  {c:"Parameter Operations",n:"Read element parameters",w:"Light",d:"Read instance and type parameters (built-in, shared, project) from any Revit element.",i:"RVT/RFA",o:"JSON/CSV/Excel",m:"element.get_Parameter(BuiltInParameter.*)",s:"aps-revit-file-parameters-exchange"},
  {c:"Parameter Operations",n:"Write / modify element parameters",w:"Light",d:"Update instance or type parameter values on Revit elements. Must be wrapped in a Revit Transaction.",i:"RVT + data file",o:"RVT (modified)",m:"Transaction t; element.get_Parameter().Set(value)",s:"aps-revit-file-parameters-exchange"},
  {c:"Parameter Operations",n:"Export all parameters to Excel",w:"Light",d:"Enumerate all elements and export parameter values to an Excel spreadsheet. A high-value, narrow use case.",i:"RVT/RCW",o:"XLSX",m:"FilteredElementCollector + LookupParameter iteration",s:"aps-revit-rcw-parameters-exchange"},
  {c:"Parameter Operations",n:"Read/write shared parameters",w:"Light",d:"Access shared parameter definitions (with GUIDs) across project or family documents. Enables cross-project parameter consistency.",i:"RVT/RFA",o:"SPF/JSON",m:"DefinitionFile; ExternalDefinition; SharedParameterElement",s:"Autodesk support docs"},
  {c:"Data Extraction",n:"Extract element properties (FilteredElementCollector)",w:"Light",d:"Query and extract properties, geometry, relationships, and metadata from any element category. The most fundamental Revit DA capability.",i:"RVT",o:"JSON/CSV/XML",m:"FilteredElementCollector; OfClass() / OfCategory()",s:"GitHub topic: design-automation-revit"},
  {c:"Data Extraction",n:"Extract schedule data",w:"Light",d:"Access ViewSchedule objects to read rows and cell values — quantity takeoffs, door schedules, room schedules, material takeoffs.",i:"RVT",o:"CSV/Excel/JSON",m:"ViewSchedule; GetCellText(SectionType.Body, row, col)",s:"Building Coder blog"},

  {c:"CAM & Manufacturing",n:"2D flat pattern nesting",w:"Heavy",d:"Automate 2D nesting of flat patterns (sheet metal, fabric) to minimise material waste using Fusion's built-in nesting algorithms.",i:"F3D (with flat pattern bodies)",o:"F3D (nested layout)/DXF",m:"Nesting API; 2D nesting configuration",s:"APS beta blog: 2D and 3D nesting explicitly listed"},
  {c:"CAM & Manufacturing",n:"3D additive manufacturing packing (TrueShape)",w:"Heavy",d:"Automate 3D packing of parts for additive builds (SLS, MJF, SLA) using Fusion's TrueShape packer — maximise parts per build, minimise support. Authentise is a confirmed production adopter.",i:"F3D (with 3D bodies)",o:"F3D (packed build layout)",m:"3D Nesting/Packing API; TrueShape packer",s:"APS GA blog: TrueShape packer; Authentise integration"},
  {c:"CAM & Manufacturing",n:"Integrate with PLM/PDM/MES",w:"Light",d:"Connect Fusion Automation outputs to enterprise systems (PLM, PDM, MES) via the cloud API architecture and webhook callbacks.",i:"F3D + external system data",o:"Modified F3D + system payload",m:"TypeScript + webhook callbacks; REST API in onComplete",s:"APS GA blog"},
]},
};

const CATS=["All","File I/O","Parameter Operations","Data Extraction","Model Creation","Model Modification","Drawing & Documentation Generation","Format Conversion & Export","Rendering & Visualisation","CAM & Manufacturing","Assembly & Component Operations","Scripting & Plugin Execution","Agentic & MCP Integration"];
let eng="Revit",cat="All",filters=new Set(),view="grid",sel=null;

function caps(){return ENG[eng].caps}
function filtered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  return caps().filter(c=>{
    const wk=c.w.toLowerCase().split('/')[0].trim();
    return (filters.size===0||filters.has(wk))&&
           (cat==="All"||c.c===cat)&&
           (!q||c.n.toLowerCase().includes(q)||c.c.toLowerCase().includes(q)||c.d.toLowerCase().includes(q));
  });
}

function wCls(w){const k=w.toLowerCase().split('/')[0].trim();return k==='light'?'wl':k==='medium'?'wm':k==='heavy'?'wh':'wv'}
function wBig(w){const k=w.toLowerCase().split('/')[0].trim();const bg=k==='light'?'lb':k==='medium'?'mb':k==='heavy'?'hb':'vb';const fg=k==='light'?'lf':k==='medium'?'mf':k==='heavy'?'hf':'vf';return`<span class="wbig" style="background:var(--${bg});color:var(--${fg})">${w}</span>`}

function setEng(e,el){
  eng=e;cat="All";sel=null;closeDP();
  document.querySelectorAll('.etab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSB();render();
}
function setView(v){
  view=v;
  document.getElementById('vt-g').classList.toggle('on',v==='grid');
  document.getElementById('vt-l').classList.toggle('on',v==='list');
  render();
}
function toggleF(w){
  if(filters.has(w))filters.delete(w);else filters.add(w);
  ['l','m','h','v'].forEach((x,i)=>{
    const keys=['light','medium','heavy','varies'];
    const el=document.getElementById('fc-'+x);
    if(el) el.className='chip'+(filters.has(keys[i])?' on-'+x:'');
  });
  render();
}
function setcat(c){
  cat=c;sel=null;closeDP();
  renderSB();render();
}
function renderSB(){
  const counts={};caps().forEach(c=>{counts[c.c]=(counts[c.c]||0)+1});counts["All"]=caps().length;
  document.getElementById('sidebar').innerHTML=
    `<div class="sl">Categories</div>`+
    CATS.filter(c=>c==="All"||counts[c]).map(c=>`
      <button class="sb-btn${cat===c?' on':''}" onclick="setcat(${JSON.stringify(c)})">
        <span class="sb-dot"></span>
        <span class="sb-lbl">${c}</span>
        <span class="sb-n">${counts[c]||0}</span>
      </button>`).join('');
}
function render(){
  const f=filtered();
  document.getElementById('rc').textContent=`${f.length} / ${caps().length}`;
  const el=document.getElementById('content');
  if(!f.length){
    el.innerHTML=`<div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><div class="empty-t">No results</div><div class="empty-s">Try adjusting your search or filters</div></div>`;
    return;
  }
  const e=ENG[eng];
  const wc={Light:0,Medium:0,Heavy:0,Varies:0};
  caps().forEach(c=>{const k=c.w.split('/')[0].trim();wc[k]=(wc[k]||0)+1});
  const meta=`<div class="meta-bar">
    <div class="mb-item"><div class="mb-l">Scripting</div><div class="mb-v" style="font-size:11px">${e.scripting}</div></div>
    <div class="mb-div"></div>
    <div class="mb-item"><div class="mb-l">Total</div><div class="mb-v" style="color:${e.col}">${caps().length}</div></div>
    <div class="mb-div"></div>
    <div class="mb-item"><div class="mb-l">Light</div><div class="mb-v" style="color:var(--lf)">${wc.Light||0}</div></div>
    <div class="mb-item"><div class="mb-l">Medium</div><div class="mb-v" style="color:var(--mf)">${wc.Medium||0}</div></div>
    <div class="mb-item"><div class="mb-l">Heavy</div><div class="mb-v" style="color:var(--hf)">${wc.Heavy||0}</div></div>
    ${wc.Varies?`<div class="mb-item"><div class="mb-l">Varies</div><div class="mb-v" style="color:var(--vf)">${wc.Varies}</div></div>`:''}
  </div>`;

  if(view==='grid'){
    const grps={};f.forEach(c=>{if(!grps[c.c])grps[c.c]=[];grps[c.c].push(c)});
    const html=CATS.filter(c=>grps[c]).map(c=>`
      <div class="sec-hdr"><div class="sec-title">${c}</div><span class="sec-n">${grps[c].length}</span></div>
      <div class="grid" style="margin-bottom:22px">
        ${grps[c].map(cap=>`
          <div class="card${sel===cap?' sel':''}" onclick="showDP(this,${idx(cap)})">
            <div class="card-top"><div class="card-name">${cap.n}</div><span class="wpill ${wCls(cap.w)}">${cap.w}</span></div>
            <div class="card-desc">${cap.d}</div>
            <div class="card-io"><span class="io-tag">${cap.i.substring(0,20)}</span><span class="io-tag">${cap.o.substring(0,16)}</span></div>
          </div>`).join('')}
      </div>`).join('');
    el.innerHTML=meta+html;
  }else{
    const rows=f.map(cap=>`
      <div class="li${sel===cap?' sel':''}" onclick="showDP(this,${idx(cap)})">
        <div><div class="li-name">${cap.n}</div><div class="li-cat">${cap.c}</div></div>
        <div class="li-src">${cap.s}</div>
        <span class="wpill ${wCls(cap.w)}">${cap.w}</span>
      </div>`).join('');
    el.innerHTML=meta+`<div class="list-view">${rows}</div>`;
  }
}
function idx(cap){return caps().indexOf(cap)}
function showDP(el,i){
  sel=caps()[i];
  document.querySelectorAll('.card,.li').forEach(c=>c.classList.remove('sel'));
  if(el)el.classList.add('sel');
  const cap=sel;const e=ENG[eng];
  document.getElementById('dp-in').innerHTML=`
    <div class="dp-close-row">
      <span style="font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em">Capability detail</span>
      <button class="dp-close-btn" onclick="closeDP()">✕</button>
    </div>
    <div class="dp-eng" style="color:${e.col}">${eng} · ${cap.c}</div>
    <div class="dp-title">${cap.n}</div>
    ${wBig(cap.w)}
    <div class="dp-cat">${cap.c}</div>
    <div class="dp-div"></div>
    <div class="dp-lbl">Description</div>
    <div class="dp-val">${cap.d}</div>
    <div class="io-grid">
      <div class="io-box"><div class="io-bl">Input</div><div class="io-bv">${cap.i}</div></div>
      <div class="io-box"><div class="io-bl">Output</div><div class="io-bv">${cap.o}</div></div>
    </div>
    <div class="dp-div"></div>
    <div class="dp-lbl">Code Mechanism</div>
    <div class="dp-code">${cap.m}</div>
    <div class="dp-lbl">Primary Source</div>
    <div class="dp-src">${cap.s}</div>`;
  document.getElementById('dp').classList.remove('hidden');
  document.getElementById('overlay').classList.add('on');
}
function closeDP(){
  document.getElementById('dp').classList.add('hidden');
  document.getElementById('overlay').classList.remove('on');
  document.querySelectorAll('.card,.li').forEach(c=>c.classList.remove('sel'));
  sel=null;
}
renderSB();render();
</script>
</body>
</html>
